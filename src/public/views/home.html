<section class="home-hero">
    <div class="split-layout">
        <div class="featured-gallery">
            <div class="meta monospace">
                <span class="label">FEATURED_PROJECT / {{homepage.featured_project.id}}</span>
                <h1 class="featured-title uppercase">{{homepage.featured_project.title}}</h1>
                <p class="category italic">{{homepage.featured_project.category}}</p>
            </div>
            <div class="image-wrapper">
                <img class="featured-image shadow" 
                     src="{{homepage.featured_project.image_url}}" 
                     alt="{{homepage.featured_project.alt_text}}">
            </div>
        </div>

        <div class="project-sidebar">
            <div class="sidebar-header monospace">
                <span class="label">INDEX ({{homepage.total_projects}})</span>
            </div>
            <ul id="project-list" class="monospace">
                <li class="loading-state">Syncing data...</li>
            </ul>
        </div>
    </div>
</section>
